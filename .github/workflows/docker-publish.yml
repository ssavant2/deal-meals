name: Build and Push Docker Images

on:
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
  # Auto-build on version tags (v1.0, v2.3.1, etc.)
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  APP_IMAGE_NAME: ${{ github.repository }}
  DB_IMAGE_NAME: ${{ github.repository }}-db

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract app metadata (tags, labels)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}
          tags: |
            # "latest" on every build
            type=raw,value=latest
            # Date tag (YYMMDD)
            type=raw,value={{date 'YYMMDD'}}
            # Git short SHA
            type=sha,prefix=
            # Version tag (v1.0 -> 1.0, v1.0.3b -> 1.0.3b)
            type=match,pattern=v(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Extract db metadata (tags, labels)
        id: meta-db
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DB_IMAGE_NAME }}
          tags: |
            # "latest" on every build
            type=raw,value=latest
            # Date tag (YYMMDD)
            type=raw,value={{date 'YYMMDD'}}
            # Git short SHA
            type=sha,prefix=
            # Version tag (v1.0 -> 1.0, v1.0.3b -> 1.0.3b)
            type=match,pattern=v(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          build-args: |
            RELEASE_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}

      - name: Build and push db image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.db
          push: true
          tags: ${{ steps.meta-db.outputs.tags }}
          labels: ${{ steps.meta-db.outputs.labels }}
